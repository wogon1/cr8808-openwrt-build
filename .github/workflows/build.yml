name: Build CR880x OpenWrt

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL || true
          docker system prune -af || true
          df -h

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential clang flex bison g++ gawk gcc-multilib gettext \
            git libncurses5-dev libssl-dev python3 python3-setuptools \
            rsync unzip zlib1g-dev file wget curl libelf-dev

      - name: Clone OpenWrt source for CR880x
        run: |
          git clone --depth=1 \
            -b ipq50xx-mainline-kernel-5.15-openwrt-23.05 \
            https://github.com/hzyitc/openwrt-redmi-ax3000.git openwrt

      - name: Add OpenClash package
        working-directory: openwrt
        run: |
          git clone --depth=1 https://github.com/vernesong/OpenClash.git /tmp/OpenClash
          cp -r /tmp/OpenClash/luci-app-openclash package/luci-app-openclash

      - name: Update feeds
        working-directory: openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Build initramfs image
        working-directory: openwrt
        run: |
          cat > .config <<'EOF'
          CONFIG_TARGET_ipq50xx=y
          CONFIG_TARGET_ipq50xx_arm=y
          CONFIG_TARGET_ipq50xx_arm_DEVICE_redmi_ax3000=y
          CONFIG_TARGET_ROOTFS_INITRAMFS=y

          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-ssl=y
          CONFIG_PACKAGE_luci-app-opkg=y
          CONFIG_PACKAGE_luci-i18n-base-zh-cn=y
          CONFIG_PACKAGE_luci-i18n-firewall-zh-cn=y
          CONFIG_PACKAGE_luci-i18n-opkg-zh-cn=y

          CONFIG_PACKAGE_bash=y
          CONFIG_PACKAGE_ca-bundle=y
          CONFIG_PACKAGE_curl=y
          CONFIG_PACKAGE_unzip=y
          CONFIG_PACKAGE_ip-full=y
          CONFIG_PACKAGE_uboot-envtools=y
          EOF

          make defconfig
          make -j$(nproc) download
          make -j$(nproc) || make -j1 V=s

      - name: Collect initramfs
        run: |
          mkdir -p output/initramfs
          find openwrt/bin/targets -type f \( -name "*initramfs*" -o -name "*.itb" -o -name "*.bin" \) -exec cp -v {} output/initramfs/ \;
          ls -lh output/initramfs

      - name: Clean before full firmware
        working-directory: openwrt
        run: |
          make clean

      - name: Build full OpenClash firmware
        working-directory: openwrt
        run: |
          cat > .config <<'EOF'
          CONFIG_TARGET_ipq50xx=y
          CONFIG_TARGET_ipq50xx_arm=y
          CONFIG_TARGET_ipq50xx_arm_DEVICE_redmi_ax3000=y

          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-ssl=y
          CONFIG_PACKAGE_luci-compat=y
          CONFIG_PACKAGE_luci-app-opkg=y
          CONFIG_PACKAGE_luci-app-openclash=y
          CONFIG_PACKAGE_luci-app-ttyd=y

          CONFIG_PACKAGE_luci-i18n-base-zh-cn=y
          CONFIG_PACKAGE_luci-i18n-firewall-zh-cn=y
          CONFIG_PACKAGE_luci-i18n-opkg-zh-cn=y

          CONFIG_PACKAGE_bash=y
          CONFIG_PACKAGE_ca-bundle=y
          CONFIG_PACKAGE_curl=y
          CONFIG_PACKAGE_unzip=y
          CONFIG_PACKAGE_ip-full=y
          CONFIG_PACKAGE_uboot-envtools=y

          CONFIG_PACKAGE_dnsmasq=n
          CONFIG_PACKAGE_dnsmasq-full=y

          CONFIG_PACKAGE_kmod-tun=y
          CONFIG_PACKAGE_kmod-inet-diag=y
          CONFIG_PACKAGE_kmod-nft-tproxy=y
          CONFIG_PACKAGE_kmod-nft-socket=y
          CONFIG_PACKAGE_kmod-nft-nat=y

          CONFIG_PACKAGE_iptables-nft=y
          CONFIG_PACKAGE_ip6tables-nft=y
          CONFIG_PACKAGE_nftables-json=y

          CONFIG_PACKAGE_ruby=y
          CONFIG_PACKAGE_ruby-yaml=y
          EOF

          make defconfig
          make -j$(nproc) download
          make -j$(nproc) || make -j1 V=s

      - name: Collect full firmware
        run: |
          mkdir -p output/factory-openclash
          find openwrt/bin/targets -type f \( -name "*.ubi" -o -name "*.bin" -o -name "*.itb" -o -name "*initramfs*" -o -name "*.manifest" -o -name "*.buildinfo" -o -name "*.json" \) -exec cp -v {} output/factory-openclash/ \;
          ls -lh output/factory-openclash

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: cr880x-openwrt-initramfs-and-openclash
          path: output/*
